<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CDN Analyzer</h1>
            <button id="refresh-btn" class="icon-btn" title="Refresh Data">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </header>

        <main>
            <div class="card provider-card">
                <span class="label">Primary CDN Provider</span>
                <h2 id="cdn-provider" class="value text-gradient">Analyzing...</h2>
            </div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="label">Cache Status</span>
                    <span id="cache-status" class="value badge unknown">UNKNOWN</span>
                </div>
                <div class="metric-box">
                    <span class="label">Avg Load Time</span>
                    <span id="load-time" class="value">0 ms</span>
                </div>
                <div class="metric-box">
                    <span class="label">Total Requests</span>
                    <span id="total-requests" class="value">0</span>
                </div>
                <div class="metric-box error-box">
                    <span class="label">Errors</span>
                    <span id="errors" class="value text-error">0</span>
                </div>
            </div>
            
            <div class="summary-section">
                <h3>Request Summary</h3>
                <p id="summary-text">Waiting for network activity...</p>
            </div>
        </main>
        
        <footer>
            <span>Manifest V3 Ready</span>
        </footer>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
