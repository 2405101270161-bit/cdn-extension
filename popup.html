<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CDN Analyzer</h1>
            <button id="refreshBtn" class="icon-btn" title="Refresh Data">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </header>

        <main>
            <div class="input-section" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="urlInput" placeholder="Enter website URL..." autofocus style="padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); font-size: 0.95rem; outline: none; width: 100%; box-sizing: border-box;" />
                <div style="display: flex; gap: 10px;">
                    <button id="analyzeBtn" disabled style="flex: 1; padding: 10px; border-radius: 8px; background: linear-gradient(135deg, #38bdf8, #818cf8); color: white; font-weight: bold; border: none; cursor: pointer;">Analyze</button>
                </div>
            </div>

            <div id="resultsArea">
                <!-- Data populated dynamically -->
            </div>
        </main>
        
        <footer>
            <span>Manifest V3 Ready</span>
        </footer>
    </div>
    
    <template id="loadingTemplate">
        <div class="loading-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 15px;">
            <div style="width: 40px; height: 40px; border: 3px solid rgba(139, 92, 246, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p>Analyzing...</p>
        </div>
    </template>
    
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    
    <script src="popup.js"></script>
</body>
</html>
