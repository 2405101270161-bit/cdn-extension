<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Analyzer Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <h1>CDN Analyzer Pro</h1>
            <button id="refreshBtn" style="display: none;"></button>
        </header>

        <main class="app-main">
            <div class="input-section">
                <input type="text" id="urlInput" class="app-input" placeholder="Enter website URL..." autofocus />
                <button id="analyzeBtn" class="btn primary-btn app-btn" disabled>Analyze</button>
            </div>

            <div id="resultsArea">
                <!-- Data populated dynamically -->
            </div>
        </main>
    </div>
    
    <template id="loadingTemplate">
        <div class="loading-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 15px;">
            <div style="width: 40px; height: 40px; border: 3px solid rgba(139, 92, 246, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p>Analyzing...</p>
        </div>
    </template>
    
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    
    <script src="popup.js"></script>
</body>
</html>
